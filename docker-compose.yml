services:
  postgres:
    image: postgres:16-alpine
    container_name: ats-postgres
    environment:
      POSTGRES_USER: ats
      POSTGRES_PASSWORD: ats
      POSTGRES_DB: ats
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ats"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: ats-server
    environment:
      DATABASE_URL: postgresql://ats:ats@postgres:5432/ats
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  proxy:
    build:
      context: .
      dockerfile: apps/proxy/Dockerfile
    container_name: ats-proxy
    environment:
      SERVER_URL: http://server:3000
      INGEST_API_KEY: ${INGEST_API_KEY:-dev-key}
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      - server

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: ats-web
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  postgres-data:
